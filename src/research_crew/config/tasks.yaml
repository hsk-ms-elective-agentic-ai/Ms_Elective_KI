# src/research_crew/config/tasks.yaml
#
# `description` plays the role of the "user" message in step 2 — the actual
# question/instruction, sent per task rather than once for the whole agent.
# `expected_output` plays the role of step 2b's data_format component (what
# the output should look like) — it's just scoped per task instead of per agent.
research_task:
  description: >
    Conduct thorough research on {topic}. Focus on:
    1. Key concepts and definitions
    2. Historical development and recent trends
    3. Major challenges and opportunities
    4. Notable applications or case studies
    5. Future outlook and potential developments

    Make sure to organize your findings in a structured format with clear sections.
  expected_output: >
    A comprehensive research document with well-organized sections covering
    all the requested aspects of {topic}. Include specific facts, figures,
    and examples where relevant.
  agent: researcher

analysis_task:
  description: >
    Analyze the research findings and create a comprehensive report on {topic}.
    Your report should:
    1. Begin with an executive summary
    2. Include all key information from the research
    3. Provide insightful analysis of trends and patterns
    4. Offer recommendations or future considerations
    5. Be formatted in a professional, easy-to-read style with clear headings
  expected_output: >
    A polished, professional report on {topic} that presents the research
    findings with added analysis and insights. The report should be well-structured
    with an executive summary, main sections, and conclusion.
  agent: analyst
  # Same idea as step 2c's chain prompting: research_task's output is fed in
  # as context for this task, instead of you pasting it into the next prompt by hand.
  context:
    - research_task
  output_file: output/report.md